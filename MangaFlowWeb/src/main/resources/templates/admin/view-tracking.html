<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">
<head>
<meta charset="UTF-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Theo Dõi Lượt Xem — Trang Quản Trị</title>
<th:block th:replace="~{admin/fragments/admin-styles :: admin-styles}"></th:block>
</head>
<body class="bg-background text-on-surface flex min-h-screen">

<th:block th:replace="~{admin/fragments/admin-sidebar :: admin-sidebar(activeSection='view-tracking')}"></th:block>

<main class="ml-72 flex-1 p-8 bg-background">
  <header class="mb-6">
    <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Phân Tích</p>
    <h2 class="text-4xl font-extrabold tracking-tighter">Theo Dõi Lượt Xem</h2>
  </header>

  <!-- Search + filters -->
  <div class="bg-surface-container-lowest rounded-xl shadow-sm p-4 mb-6">
    <form th:action="@{/admin/view-tracking}" method="get" class="flex flex-wrap gap-3 items-end">
      <div class="relative flex-1 min-w-48">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
        <input type="text" name="search" th:value="${searchQuery}" placeholder="Tìm theo tiêu đề..."
               class="w-full pl-9 pr-3 py-2 text-sm border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-surface-container-lowest"/>
      </div>
      <div class="flex gap-1">
        <a th:href="@{/admin/view-tracking(sortBy='id',sortOrder='asc',filterBy=${filterBy})}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${sortBy == 'id' and sortOrder == 'asc'} ? ' bg-primary text-on-primary border-primary' : ''">ID ↑</a>
        <a th:href="@{/admin/view-tracking(sortBy='id',sortOrder='desc',filterBy=${filterBy})}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${sortBy == 'id' and sortOrder == 'desc'} ? ' bg-primary text-on-primary border-primary' : ''">ID ↓</a>
        <a th:href="@{/admin/view-tracking(sortBy='name',sortOrder='asc',filterBy=${filterBy})}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${sortBy == 'name' and sortOrder == 'asc'} ? ' bg-primary text-on-primary border-primary' : ''">A–Z</a>
        <a th:href="@{/admin/view-tracking(sortBy='name',sortOrder='desc',filterBy=${filterBy})}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${sortBy == 'name' and sortOrder == 'desc'} ? ' bg-primary text-on-primary border-primary' : ''">Z–A</a>
      </div>
      <div class="flex gap-1">
        <a th:href="@{/admin/view-tracking(sortBy=${sortBy},sortOrder=${sortOrder})}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${filterBy == null or filterBy == ''} ? ' bg-secondary text-white border-secondary' : ''">Tất Cả</a>
        <a th:href="@{/admin/view-tracking(sortBy=${sortBy},sortOrder=${sortOrder},filterBy='most-viewed')}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${filterBy == 'most-viewed'} ? ' bg-secondary text-white border-secondary' : ''">Xem Nhiều Nhất</a>
        <a th:href="@{/admin/view-tracking(sortBy=${sortBy},sortOrder=${sortOrder},filterBy='least-viewed')}"
           class="px-3 py-2 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors"
           th:classappend="${filterBy == 'least-viewed'} ? ' bg-secondary text-white border-secondary' : ''">Xem Ít Nhất</a>
      </div>
      <button type="submit" class="px-4 py-2 bg-primary hover:bg-primary-dim text-on-primary rounded-lg text-sm font-bold">Tìm Kiếm</button>
    </form>
  </div>

  <!-- Comics table -->
  <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden" th:if="${comics != null and !comics.isEmpty()}">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-surface-container-high">
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">ID</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Tiêu Đề</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Tác Giả</th>
          <th class="px-6 py-3 text-on-surface-variant text-right" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Lượt Xem</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Trạng Thái</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-container">
        <tr th:each="comic : ${comics}" class="hover:bg-surface-container-low transition-colors">
          <td class="px-6 py-3 text-sm font-mono text-on-surface-variant" th:text="'#' + ${comic.comicId}"></td>
          <td class="px-6 py-3 text-sm font-medium" th:text="${comic.title}"></td>
          <td class="px-6 py-3 text-sm text-on-surface-variant" th:text="${comic.user != null ? comic.user.username : '—'}"></td>
          <td class="px-6 py-3 text-right">
            <span class="inline-flex items-center gap-1 text-sm font-bold text-secondary">
              <span class="material-symbols-outlined" style="font-size:14px">visibility</span>
              <span th:text="${comic.viewCount}">0</span>
            </span>
          </td>
          <td class="px-6 py-3">
            <span th:if="${comic.status.name() == 'ONGOING'}"   class="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full" th:text="${comic.status}"></span>
            <span th:if="${comic.status.name() == 'SCHEDULED'}" class="text-xs font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-full"  th:text="${comic.status}"></span>
            <span th:if="${comic.status.name() == 'CANCELED'}"  class="text-xs font-bold text-stone-500 bg-stone-100 px-2 py-0.5 rounded-full" th:text="${comic.status}"></span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${comics == null or comics.isEmpty()}"
       class="bg-surface-container-lowest rounded-xl shadow-sm py-16 text-center text-on-surface-variant text-sm">
    No comics found.
  </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/></head>
<body>

<th:block th:fragment="admin-styles">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#f9f6f5","on-surface":"#2f2f2e","on-surface-variant":"#5c5b5b","surface-container-lowest":"#ffffff","surface-container-low":"#f3f0ef","surface-container":"#eae7e7","surface-container-high":"#e4e2e1","primary":"#914700","primary-dim":"#7f3d00","on-primary":"#fff0e8","secondary":"#005e9f","outline-variant":"#afadac","error":"#b02500"},fontFamily:{headline:["Plus Jakarta Sans"],body:["Manrope"]}}}}
    </script>
    <style>
    body{font-family:'Manrope',sans-serif;}
    h1,h2,h3{font-family:'Plus Jakarta Sans',sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}
    </style>
</th:block>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">
<head>
<meta charset="UTF-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Doanh Thu — Trang Quản Trị</title>
<th:block th:replace="~{admin/fragments/admin-styles :: admin-styles}"></th:block>
</head>
<body class="bg-background text-on-surface flex min-h-screen">

<th:block th:replace="~{admin/fragments/admin-sidebar :: admin-sidebar(activeSection='revenue')}"></th:block>

<main class="ml-72 flex-1 p-8 bg-background">
  <header class="mb-8">
    <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Tài Chính</p>
    <h2 class="text-4xl font-extrabold tracking-tighter">Doanh Thu</h2>
  </header>

  <!-- Summary cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
    <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="material-symbols-outlined text-primary">payments</span>
        <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Tổng Doanh Thu</p>
      </div>
      <p class="text-3xl font-extrabold tracking-tighter text-green-600">
        <span th:text="${#numbers.formatDecimal(totalRevenue, 0, 'POINT', 0, 'NONE')}">0.00</span>₫
      </p>
    </div>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="material-symbols-outlined text-primary">receipt_long</span>
        <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Tổng Giao Dịch</p>
      </div>
      <p class="text-3xl font-extrabold tracking-tighter" th:text="${totalTransactions}">0</p>
    </div>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="material-symbols-outlined text-primary">check_circle</span>
        <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Gói Đang Hoạt Động</p>
      </div>
      <p class="text-3xl font-extrabold tracking-tighter" th:text="${#lists.size(activeTransactions)}">0</p>
    </div>
  </div>

  <!-- Revenue by subscription (free tier excluded) -->
  <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6 mb-8">
    <h3 class="text-lg font-bold mb-4">Doanh Thu Theo Gói</h3>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3" th:if="${!revenueBySubscription.isEmpty()}">
      <div th:each="item : ${revenueBySubscription}"
           th:if="${item.revenue != null and item.revenue > 0}"
           class="bg-surface-container-low rounded-lg p-4 border-l-4 border-primary">
        <p class="text-sm font-bold text-on-surface mb-1" th:text="${item.subscriptionName}">Plan</p>
        <p class="text-xl font-extrabold text-green-600">
          <span th:text="${#numbers.formatDecimal(item.revenue, 0, 'POINT', 0, 'NONE')}">0.00</span>₫
        </p>
      </div>
    </div>
    <p th:if="${revenueBySubscription.isEmpty()}" class="text-on-surface-variant text-sm py-6 text-center">Chưa có dữ liệu doanh thu.</p>
  </div>

  <!-- Recent transactions -->
  <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-surface-container-high">
      <h3 class="text-lg font-bold">Giao Dịch Gần Đây</h3>
    </div>
    <table class="w-full text-left border-collapse" th:if="${!transactions.isEmpty()}">
      <thead>
        <tr class="border-b border-surface-container-high">
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">ID</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Người Dùng</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Gói Đăng Ký</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Số Tiền</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Trạng Thái</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Gói Trạng Thái</th>
          <th class="px-6 py-3 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Ngày</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-container">
        <tr th:each="t : ${transactions}"
            th:if="${t.price != null and t.price > 0}"
            class="hover:bg-surface-container-low transition-colors">
          <td class="px-6 py-3 text-sm font-mono text-on-surface-variant" th:text="'#' + ${t.transactionId}"></td>
          <td class="px-6 py-3 text-sm font-medium" th:text="${t.user.username}"></td>
          <td class="px-6 py-3 text-sm font-medium" th:text="${t.subscription.name}"></td>
          <td class="px-6 py-3 text-sm font-bold text-green-600" th:text="${#numbers.formatDecimal(t.price, 0, 'POINT', 0, 'NONE')} + '₫'"></td>
          <td class="px-6 py-3">
            <span th:text="${t.status}"
              class="text-xs font-bold px-2 py-0.5 rounded-full"
              th:classappend="
                ${t.status.name() == 'SUCCESS'} ? 'text-green-700 bg-green-100' :
                (${t.status.name() == 'PENDING'} ? 'text-blue-700 bg-blue-100' :
                (${t.status.name() == 'FAILED'} ? 'text-red-700 bg-red-100' :
                (${t.status.name() == 'CANCELED'} ? 'text-gray-700 bg-gray-100' :
                (${t.status.name() == 'UPDATED'} ? 'text-yellow-700 bg-yellow-100' :
                'text-stone-500 bg-stone-100'))))">
            </span>
          </td>
          <td class="px-6 py-3">
            <span th:text="${t.statusSubs}"
              class="text-xs font-bold px-2 py-0.5 rounded-full"
              th:classappend="${t.statusSubs == 'ACTIVE'} ? 'text-emerald-700 bg-emerald-100' : 'text-stone-500 bg-stone-100'">
            </span>
          </td>
          <td class="px-6 py-3 text-sm text-on-surface-variant" th:text="${#temporals.format(t.createdAt, 'dd/MM/yyyy')}"></td>
        </tr>
      </tbody>
    </table>
    <p th:if="${transactions.isEmpty()}" class="px-6 py-10 text-center text-on-surface-variant text-sm">Không tìm thấy giao dịch.</p>
  </div>
</main>
</body>
</html>

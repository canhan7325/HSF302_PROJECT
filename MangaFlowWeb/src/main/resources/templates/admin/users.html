<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Management — Admin Panel</title>
<th:block th:replace="~{admin/fragments/admin-styles :: admin-styles}"></th:block>
</head>
<body class="bg-background text-on-surface flex min-h-screen">

<!-- Custom confirm modal -->
<div id="confirm-modal" role="dialog" aria-modal="true" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;">
  <div id="confirm-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.45);"></div>
  <div style="position:relative;background:#fff;border-radius:16px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center;">
    <div style="font-size:36px;margin-bottom:8px;">⚠️</div>
    <div id="confirm-title" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:6px;"></div>
    <div id="confirm-msg" style="font-size:.875rem;color:#5c5b5b;margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="confirm-cancel" class="px-5 py-2 rounded-lg border border-outline-variant text-sm font-bold hover:bg-surface-container">Cancel</button>
      <button id="confirm-ok" class="px-5 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-bold">Confirm</button>
    </div>
  </div>
</div>
<!-- Toast -->
<div id="toast" style="position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

<th:block th:replace="~{admin/fragments/admin-sidebar :: admin-sidebar(activeSection='users')}"></th:block>

<main class="ml-72 flex-1 p-8 bg-background">

<!-- LIST -->
<th:block th:if="${view == 'list'}">
  <header class="mb-8 flex justify-between items-end">
    <div>
      <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Members</p>
      <h2 class="text-4xl font-extrabold tracking-tighter">User Management</h2>
    </div>
    <a th:href="@{/admin/users/new}" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm">
      <span class="material-symbols-outlined" style="font-size:18px">add</span>Add User
    </a>
  </header>
  <th:block th:replace="~{admin/fragments/admin :: flash(${successMessage}, ${errorMessage})}"></th:block>
  <script th:if="${successMessage != null}" th:inline="javascript">
    document.addEventListener('DOMContentLoaded',function(){showToast([[${successMessage}]],'success');});
  </script>
  <script th:if="${errorMessage != null}" th:inline="javascript">
    document.addEventListener('DOMContentLoaded',function(){showToast([[${errorMessage}]],'error');});
  </script>
  <form th:action="@{/admin/users}" method="get" class="flex gap-2 max-w-md mb-6">
    <div class="relative flex-1">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
      <input type="text" name="search" th:value="${search}" placeholder="Search..."
             class="w-full pl-9 pr-3 py-2 text-sm border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-surface-container-lowest"/>
    </div>
    <button type="submit" class="px-4 py-2 bg-primary hover:bg-primary-dim text-on-primary rounded-lg text-sm font-bold">Search</button>
    <a th:if="${search != null and search != ''}" th:href="@{/admin/users}" class="px-3 py-2 border border-outline-variant rounded-lg text-sm hover:bg-surface-container">Clear</a>
  </form>
  <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-surface-container-high">
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Username</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Email</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Role</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Status</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Registered</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-container">
        <tr th:each="u : ${page.content}" class="hover:bg-surface-container-low transition-colors">
          <td class="px-6 py-4 font-medium text-sm" th:text="${u.username}"></td>
          <td class="px-6 py-4 text-sm" th:text="${u.email}"></td>
          <td class="px-6 py-4">
            <span th:if="${u.role == 'ADMIN'}" class="text-xs font-bold text-purple-700 bg-purple-100 px-2 py-0.5 rounded-full" th:text="${u.role}"></span>
            <span th:if="${u.role != 'ADMIN'}" class="text-xs font-bold text-stone-600 bg-stone-100 px-2 py-0.5 rounded-full" th:text="${u.role}"></span>
          </td>
          <td class="px-6 py-4">
            <span th:if="${u.enabled}"  class="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full">Active</span>
            <span th:if="${!u.enabled}" class="text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded-full">Disabled</span>
          </td>
          <td class="px-6 py-4 text-sm" th:text="${u.createdAt != null ? #temporals.format(u.createdAt,'yyyy-MM-dd') : '—'}"></td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-1">
              <a th:href="@{/admin/users/{id}/edit(id=${u.userId})}" title="Edit" class="p-1.5 rounded-lg hover:bg-surface-container text-secondary transition-colors">
                <span class="material-symbols-outlined" style="font-size:18px">edit</span>
              </a>
              <form th:if="${u.enabled}" th:action="@{/admin/users/{id}/delete(id=${u.userId})}" method="post" class="delete-form">
                <button type="button" title="Disable" class="p-1.5 rounded-lg hover:bg-red-50 text-red-500 transition-colors delete-btn"
                        data-title="Disable User" data-msg="This user will be disabled and won't be able to log in.">
                  <span class="material-symbols-outlined" style="font-size:18px">person_off</span>
                </button>
              </form>
              <form th:if="${!u.enabled}" th:action="@{/admin/users/{id}/restore(id=${u.userId})}" method="post">
                <button type="submit" title="Restore" class="p-1.5 rounded-lg hover:bg-green-50 text-green-600 transition-colors">
                  <span class="material-symbols-outlined" style="font-size:18px">person_check</span>
                </button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${page.content.empty}">
          <td colspan="6" class="px-6 py-10 text-center text-on-surface-variant text-sm">No users found.</td>
        </tr>
      </tbody>
    </table>
  </div>
  <th:block th:replace="~{admin/fragments/admin :: pagination(${page}, '/admin/users', '')}"></th:block>
</th:block>

<!-- FORM -->
<th:block th:if="${view == 'form'}">
  <header class="mb-8">
    <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Members</p>
    <h2 class="text-4xl font-extrabold tracking-tighter" th:text="${editMode} ? 'Edit User' : 'Add User'">User Form</h2>
  </header>
  <div class="bg-surface-container-lowest rounded-xl shadow-sm p-8 max-w-2xl">
    <div th:if="${duplicateError}" class="mb-6 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium" th:text="${duplicateError}"></div>

    <!-- Create -->
    <form th:if="${editMode == null or !editMode}" th:action="@{/admin/users/new}" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-bold mb-1">Username</label>
        <input type="text" name="username" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">Email</label>
        <input type="email" name="email" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">Role</label>
        <select name="role" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
          <option value="">-- Select Role --</option>
          <option value="READER">READER</option>
          <option value="AUTHOR">AUTHOR</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">Password</label>
        <input type="password" name="password" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
        <p class="text-xs text-on-surface-variant mt-1">Required when creating a new user.</p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold">Create User</button>
        <a th:href="@{/admin/users}" class="px-4 py-2 rounded-lg border border-outline-variant font-bold text-sm hover:bg-surface-container">Cancel</a>
      </div>
    </form>

    <!-- Edit -->
    <form th:if="${editMode}" th:action="@{/admin/users/{id}/edit(id=${userId})}" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-bold mb-1">Username</label>
        <input type="text" name="username" th:value="${userInfo != null ? userInfo.username : ''}" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">Email</label>
        <input type="email" name="email" th:value="${userInfo != null ? userInfo.email : ''}" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">Role</label>
        <select name="role" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
          <option value="">-- Select Role --</option>
          <option value="READER" th:selected="${userInfo != null and userInfo.role == 'READER'}">READER</option>
          <option value="AUTHOR" th:selected="${userInfo != null and userInfo.role == 'AUTHOR'}">AUTHOR</option>
          <option value="ADMIN"  th:selected="${userInfo != null and userInfo.role == 'ADMIN'}">ADMIN</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-bold mb-1">New Password</label>
        <input type="password" name="password" autocomplete="new-password" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
        <p class="text-xs text-on-surface-variant mt-1">Leave blank to keep the existing password.</p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold">Save Changes</button>
        <a th:href="@{/admin/users}" class="px-4 py-2 rounded-lg border border-outline-variant font-bold text-sm hover:bg-surface-container">Cancel</a>
      </div>
    </form>
  </div>
</th:block>

</main>
<script>
function showConfirm(title,msg,onOk){
  var m=document.getElementById('confirm-modal');
  document.getElementById('confirm-title').textContent=title||'Confirm';
  document.getElementById('confirm-msg').textContent=msg||'Are you sure?';
  m.style.display='flex';
  function close(){m.style.display='none';}
  document.getElementById('confirm-ok').onclick=function(){close();onOk();};
  document.getElementById('confirm-cancel').onclick=close;
  document.getElementById('confirm-backdrop').onclick=close;
}
function showToast(message,type){
  var c=document.getElementById('toast');
  var item=document.createElement('div');
  item.style.cssText='display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:12px;font-size:.875rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:auto;background:'+(type==='error'?'#fee2e2;color:#991b1b':'#dcfce7;color:#166534')+';';
  item.innerHTML='<span class="material-symbols-outlined" style="font-size:18px">'+(type==='error'?'error':'check_circle')+'</span><span>'+message+'</span>';
  c.appendChild(item);
  requestAnimationFrame(function(){item.style.opacity='1';item.style.transform='translateY(0)';});
  setTimeout(function(){item.style.opacity='0';setTimeout(function(){item.remove();},350);},3500);
}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.delete-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var form=btn.closest('.delete-form');
      showConfirm(btn.dataset.title||'Confirm',btn.dataset.msg||'Are you sure?',function(){form.submit();});
    });
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tổng Quan — Trang Quản Trị</title>
<th:block th:replace="~{admin/fragments/admin-styles :: admin-styles}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-background text-on-surface flex min-h-screen">

<th:block th:replace="~{admin/fragments/admin-sidebar :: admin-sidebar(activeSection='dashboard')}"></th:block>

<main class="ml-72 flex-1 p-8 bg-background">
    <header class="mb-8">
        <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Tổng Quan</p>
        <h2 class="text-4xl font-extrabold tracking-tighter text-on-surface">Bảng Điều Khiển</h2>
    </header>

    <!-- Stats cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex items-center gap-3 mb-3">
                <span class="material-symbols-outlined text-primary">group</span>
                <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Người Dùng Hoạt Động</p>
            </div>
            <p class="text-3xl font-extrabold tracking-tighter" th:text="${stats.totalActiveUsers}">0</p>
        </div>
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex items-center gap-3 mb-3">
                <span class="material-symbols-outlined text-primary">menu_book</span>
                <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Manga Đang Hoạt Động</p>
            </div>
            <p class="text-3xl font-extrabold tracking-tighter" th:text="${stats.totalActiveComics}">0</p>
        </div>
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex items-center gap-3 mb-3">
                <span class="material-symbols-outlined text-primary">visibility</span>
                <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Tổng Lượt Xem</p>
            </div>
            <p class="text-3xl font-extrabold tracking-tighter" th:text="${stats.totalViewCount}">0</p>
        </div>
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex items-center gap-3 mb-3">
                <span class="material-symbols-outlined text-primary">category</span>
                <p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Thể Loại Đang Dùng</p>
            </div>
            <p class="text-3xl font-extrabold tracking-tighter" th:text="${stats.totalActiveGenres}">0</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- Most Viewed Manga -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                <h3 class="text-lg font-bold">Manga Xem Nhiều Nhất</h3>
                <div class="flex gap-1">
                    <button data-limit="5"  class="manga-limit-btn px-3 py-1 rounded-lg text-xs font-bold bg-primary text-on-primary transition-colors">Top 5</button>
                    <button data-limit="10" class="manga-limit-btn px-3 py-1 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors">Top 10</button>
                    <button data-limit="0"  class="manga-limit-btn px-3 py-1 rounded-lg text-xs font-bold border border-outline-variant hover:bg-surface-container transition-colors">Tất Cả</button>
                </div>
            </div>
            <canvas id="mangaViewsChart"></canvas>
        </div>

        <!-- Revenue Over Time -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                <h3 class="text-lg font-bold">Doanh Thu Theo Thời Gian</h3>
                <div class="flex gap-2">
                    <a th:href="@{/admin/dashboard(period='week')}"
                       th:classappend="${activePeriod == 'week'}  ? ' bg-primary text-on-primary' : ' border border-outline-variant hover:bg-surface-container'"
                       class="px-3 py-1 rounded-lg text-xs font-bold transition-colors">Tuần</a>
                    <a th:href="@{/admin/dashboard(period='month')}"
                       th:classappend="${activePeriod == 'month'} ? ' bg-primary text-on-primary' : ' border border-outline-variant hover:bg-surface-container'"
                       class="px-3 py-1 rounded-lg text-xs font-bold transition-colors">Tháng</a>
                    <a th:href="@{/admin/dashboard(period='year')}"
                       th:classappend="${activePeriod == 'year'}  ? ' bg-primary text-on-primary' : ' border border-outline-variant hover:bg-surface-container'"
                       class="px-3 py-1 rounded-lg text-xs font-bold transition-colors">Năm</a>
                    <a th:href="@{/admin/dashboard(period='all')}"
                       th:classappend="${activePeriod == 'all'}   ? ' bg-primary text-on-primary' : ' border border-outline-variant hover:bg-surface-container'"
                       class="px-3 py-1 rounded-lg text-xs font-bold transition-colors">Tất Cả</a>
                </div>
            </div>
            <canvas id="revenueChart"></canvas>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const allComics = /*[[${topComics}]]*/ [];
    let mangaChart  = null;
    let activeLimit = 5;

    const PALETTE = [
        '#914700','#1a73e8','#0f9d58','#f4b400','#db4437',
        '#7b1fa2','#00838f','#e65100','#37474f','#6d4c41'
    ];

    function renderMangaChart() {
        const slice  = activeLimit <= 0 ? allComics : allComics.slice(0, activeLimit);
        const labels = slice.map(c => c.title);
        const data   = slice.map(c => c.viewCount);
        const colors = slice.map((_, i) => PALETTE[i % PALETTE.length]);
        if (mangaChart) { mangaChart.destroy(); }
        mangaChart = new Chart(document.getElementById('mangaViewsChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Views', data, backgroundColor: colors, borderRadius: 6 }] },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x.toLocaleString()} views` } } },
                scales: { x: { beginAtZero: true, ticks: { precision: 0 } } }
            }
        });
    }

    document.querySelectorAll('.manga-limit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            activeLimit = parseInt(btn.dataset.limit);
            document.querySelectorAll('.manga-limit-btn').forEach(b => {
                b.classList.remove('bg-primary', 'text-on-primary');
                b.classList.add('border', 'border-outline-variant', 'hover:bg-surface-container');
            });
            btn.classList.remove('border', 'border-outline-variant', 'hover:bg-surface-container');
            btn.classList.add('bg-primary', 'text-on-primary');
            renderMangaChart();
        });
    });

    renderMangaChart();

    const revenueData = /*[[${activePeriod == 'week'  ? revenueWeek  :
                              activePeriod == 'month' ? revenueMonth :
                              activePeriod == 'all'   ? revenueAll   : revenueYear}]]*/ [];
    const revenueLabels = revenueData.map(d => d.period);
    const revenueValues = revenueData.map(d => parseFloat(d.revenue));

    new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
            labels: revenueLabels,
            datasets: [{
                label: 'Revenue (₫)',
                data: revenueValues,
                borderColor: '#1a73e8',
                backgroundColor: 'transparent',
                borderWidth: 2.5,
                tension: 0,
                fill: false,
                pointRadius: 4,
                pointBackgroundColor: '#1a73e8',
                pointHoverRadius: 6,
            }]
        },
        options: {
            responsive: true,
            interaction: { mode: 'nearest', intersect: true },
            plugins: {
                legend: { display: false },
                tooltip: {
                    displayColors: false,
                    callbacks: {
                        title: ctx => ctx[0].label,
                        label: ctx => 'Revenue: ' + ctx.parsed.y.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2}) + '₫'
                    }
                }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.08)' }, ticks: { callback: v => v + '₫' } },
                x: { grid: { color: 'rgba(0,0,0,0.08)' }, ticks: { maxRotation: 45 } }
            }
        }
    });
</script>
</body>
</html>

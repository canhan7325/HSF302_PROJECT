<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quản Lý Thể Loại — Trang Quản Trị</title>
<th:block th:replace="~{admin/fragments/admin-styles :: admin-styles}"></th:block>
</head>
<body class="bg-background text-on-surface flex min-h-screen">

<!-- Custom confirm modal -->
<div id="confirm-modal" role="dialog" aria-modal="true" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;">
  <div id="confirm-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.45);"></div>
  <div style="position:relative;background:#fff;border-radius:16px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center;">
    <div style="font-size:36px;margin-bottom:8px;">🗑️</div>
    <div id="confirm-title" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:6px;"></div>
    <div id="confirm-msg" style="font-size:.875rem;color:#5c5b5b;margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="confirm-cancel" class="px-5 py-2 rounded-lg border border-outline-variant text-sm font-bold hover:bg-surface-container">Hủy</button>
      <button id="confirm-ok" class="px-5 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-bold">Xóa</button>
    </div>
  </div>
</div>
<!-- Toast -->
<div id="toast" style="position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

<th:block th:replace="~{admin/fragments/admin-sidebar :: admin-sidebar(activeSection='genres')}"></th:block>

<main class="ml-72 flex-1 p-8 bg-background">

<!-- LIST -->
<th:block th:if="${view == 'list'}">
  <header class="mb-8 flex justify-between items-end">
    <div>
      <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Danh Mục</p>
      <h2 class="text-4xl font-extrabold tracking-tighter">Quản Lý Thể Loại</h2>
    </div>
    <a th:href="@{/admin/genres/new}" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm">
      <span class="material-symbols-outlined" style="font-size:18px">add</span>Thêm Thể Loại
    </a>
  </header>
  <th:block th:replace="~{admin/fragments/admin :: flash(${successMessage}, ${errorMessage})}"></th:block>
  <div id="page-messages"
       th:attr="data-success=${successMessage}, data-error=${errorMessage}"></div>
  <form th:action="@{/admin/genres}" method="get" class="flex gap-2 max-w-md mb-6">
    <div class="relative flex-1">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:18px">search</span>
      <input type="text" name="search" th:value="${search}" placeholder="Tìm kiếm..."
             class="w-full pl-9 pr-3 py-2 text-sm border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-surface-container-lowest"/>
    </div>
    <button type="submit" class="px-4 py-2 bg-primary hover:bg-primary-dim text-on-primary rounded-lg text-sm font-bold">Tìm Kiếm</button>
    <a th:if="${search != null and search != ''}" th:href="@{/admin/genres}" class="px-3 py-2 border border-outline-variant rounded-lg text-sm hover:bg-surface-container">Xóa Bộ Lọc</a>
  </form>
  <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-surface-container-high">
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Tên</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Slug</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Truyện</th>
          <th class="px-6 py-4 text-on-surface-variant" style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em">Thao Tác</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-container">
        <tr th:each="g : ${genres}" class="hover:bg-surface-container-low transition-colors">
          <td class="px-6 py-4 font-medium text-sm" th:text="${g.name}"></td>
          <td class="px-6 py-4 text-sm text-on-surface-variant font-mono" th:text="${g.slug}"></td>
          <td class="px-6 py-4 text-sm" th:text="${g.comicCount}"></td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-1">
              <a th:href="@{/admin/genres/{id}/edit(id=${g.genreId})}" title="Edit" class="p-1.5 rounded-lg hover:bg-surface-container text-secondary transition-colors">
                <span class="material-symbols-outlined" style="font-size:18px">edit</span>
              </a>
              <form th:action="@{/admin/genres/{id}/delete(id=${g.genreId})}" method="post" class="delete-form">
                <button type="button" title="Delete" class="p-1.5 rounded-lg hover:bg-red-50 text-red-500 transition-colors delete-btn"
                        data-title="Xóa Thể Loại" data-msg="Thao tác này sẽ xóa vĩnh viễn thể loại. Các truyện dùng thể loại này sẽ mất nhãn.">
                  <span class="material-symbols-outlined" style="font-size:18px">delete</span>
                </button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${genres.empty}">
          <td colspan="4" class="px-6 py-10 text-center text-on-surface-variant text-sm">Không tìm thấy thể loại.</td>
        </tr>
      </tbody>
    </table>
  </div>
</th:block>

<!-- FORM -->
<th:block th:if="${view == 'form'}">
  <header class="mb-8">
    <p class="text-sm font-bold text-primary tracking-widest uppercase mb-1">Danh Mục</p>
    <h2 class="text-4xl font-extrabold tracking-tighter" th:text="${editMode} ? 'Chỉnh Sửa Thể Loại' : 'Thêm Thể Loại'">Genre Form</h2>
  </header>
  <div class="bg-surface-container-lowest rounded-xl shadow-sm p-8 max-w-lg">
    <div th:if="${duplicateError}" class="mb-6 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium" th:text="${duplicateError}"></div>

    <!-- Create -->
    <form th:if="${editMode == null or !editMode}" th:action="@{/admin/genres/new}" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-bold mb-1">Tên Thể Loại</label>
        <input type="text" name="name" placeholder="VD: Hành Động" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
        <p class="text-xs text-on-surface-variant mt-1">Slug sẽ được tự động tạo từ tên.</p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold">Tạo Thể Loại</button>
        <a th:href="@{/admin/genres}" class="px-4 py-2 rounded-lg border border-outline-variant font-bold text-sm hover:bg-surface-container">Hủy</a>
      </div>
    </form>

    <!-- Edit -->
    <form th:if="${editMode}" th:action="@{/admin/genres/{id}/edit(id=${genreId})}" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-bold mb-1">Tên Thể Loại</label>
        <input type="text" name="name" th:value="${genreInfo != null ? genreInfo.name : ''}" class="w-full border border-outline-variant rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"/>
        <p class="text-xs text-on-surface-variant mt-1">Slug sẽ được tạo lại từ tên mới.</p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-primary hover:bg-primary-dim text-on-primary px-4 py-2 rounded-lg font-bold">Lưu Thay Đổi</button>
        <a th:href="@{/admin/genres}" class="px-4 py-2 rounded-lg border border-outline-variant font-bold text-sm hover:bg-surface-container">Hủy</a>
      </div>
    </form>
  </div>
</th:block>

</main>
<script>
function showConfirm(title,msg,onOk){
  var m=document.getElementById('confirm-modal');
  document.getElementById('confirm-title').textContent=title||'Confirm';
  document.getElementById('confirm-msg').textContent=msg||'Are you sure?';
  m.style.display='flex';
  function close(){m.style.display='none';}
  document.getElementById('confirm-ok').onclick=function(){close();onOk();};
  document.getElementById('confirm-cancel').onclick=close;
  document.getElementById('confirm-backdrop').onclick=close;
}
function showToast(message,type){
  var c=document.getElementById('toast');
  var item=document.createElement('div');
  item.style.cssText='display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:12px;font-size:.875rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:auto;background:'+(type==='error'?'#fee2e2;color:#991b1b':'#dcfce7;color:#166534')+';';
  item.innerHTML='<span class="material-symbols-outlined" style="font-size:18px">'+(type==='error'?'error':'check_circle')+'</span><span>'+message+'</span>';
  c.appendChild(item);
  requestAnimationFrame(function(){item.style.opacity='1';item.style.transform='translateY(0)';});
  setTimeout(function(){item.style.opacity='0';setTimeout(function(){item.remove();},350);},3500);
}
document.addEventListener('DOMContentLoaded',function(){
  var msgs = document.getElementById('page-messages');
  if (msgs) {
    var s = msgs.dataset.success;
    var e = msgs.dataset.error;
    if (s && s !== 'null') showToast(s, 'success');
    if (e && e !== 'null') showToast(e, 'error');
  }
  document.querySelectorAll('.delete-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var form=btn.closest('.delete-form');
      showConfirm(btn.dataset.title||'Delete',btn.dataset.msg||'Are you sure?',function(){form.submit();});
    });
  });
});
</script>
</body>
</html>

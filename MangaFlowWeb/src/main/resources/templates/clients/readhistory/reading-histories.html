<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading History</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=20260421_2)}">
</head>
<body class="mf-body">

<!-- Include Header -->
<div th:replace="~{clients/fragments/headers :: header}"></div>

<main class="container-fluid container-xxl px-3 px-md-4 pb-5 mf-main-content">
    <!-- Page header -->
    <header class="mb-4 mb-md-5">
        <h1 class="mb-2 mf-page-heading">Reading History</h1>
        <p class="mb-0 mf-page-subtitle">Picking up right where you left off in your journey.</p>
    </header>

    <!-- ONE LIST (newest first) -->
    <section>
        <div class="d-flex align-items-center gap-3 mb-3 mb-md-4">
            <div class="mf-history-section-label">Recent</div>
            <div class="mf-divider-line"></div>
        </div>

        <!-- Data-driven list -->
        <div class="d-flex flex-column gap-3" th:if="${histories != null and !#lists.isEmpty(histories)}">
            <article class="mf-history-list-item p-3 p-md-4" th:each="h : ${histories}">
                <div class="d-flex align-items-center gap-3">
                    <div class="mf-history-thumb">
                        <img class="w-100 h-100 object-fit-cover"
                             th:src="${h.coverUrl != null ? h.coverUrl : 'https://placehold.co/240x320?text=Cover'}" alt="thumb">
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between gap-3">
                            <div>
                                <h6 class="mb-1" style="font-weight: 900;" th:text="${h.comicTitle}">Comic title</h6>
                                <div class="text-muted" style="font-size: 0.9rem;" th:text="${h.chapterText}">Chapter ...</div>
                            </div>
                            <div class="text-end">
                                <div class="mf-comic-time" th:text="${h.timestampText != null ? h.timestampText : h.timeAgo}">JUST NOW</div>
                                <a class="mf-history-continue mt-2 d-inline-block" th:href="${h.continueUrl != null ? h.continueUrl : '#'}">Continue</a>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </div>

        <!-- fallback demo when model isn't wired yet -->
        <div class="d-flex flex-column gap-3" th:if="${histories == null}">
            <article class="mf-history-list-item p-3 p-md-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="mf-history-thumb">
                        <img class="w-100 h-100 object-fit-cover" src="https://placehold.co/240x320/png?text=Cover" alt="thumb">
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between gap-3">
                            <div>
                                <h6 class="mb-1" style="font-weight: 900;">Neon Ronin</h6>
                                <div class="text-muted" style="font-size: 0.9rem;">Chapter 142</div>
                            </div>
                            <div class="text-end">
                                <div class="mf-comic-time">2 HOURS AGO</div>
                                <a class="mf-history-continue mt-2 d-inline-block" href="#">Continue</a>
                            </div>
                        </div>
                    </div>
                </div>
            </article>

            <article class="mf-history-list-item p-3 p-md-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="mf-history-thumb">
                        <img class="w-100 h-100 object-fit-cover" src="https://placehold.co/240x320/png?text=Cover" alt="thumb">
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between gap-3">
                            <div>
                                <h6 class="mb-1" style="font-weight: 900;">The Bark &amp; Binding</h6>
                                <div class="text-muted" style="font-size: 0.9rem;">Chapter 28</div>
                            </div>
                            <div class="text-end">
                                <div class="mf-comic-time">5 HOURS AGO</div>
                                <a class="mf-history-continue mt-2 d-inline-block" href="#">Continue</a>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </div>

        <div class="mf-empty-state text-center py-5" th:if="${histories != null and #lists.isEmpty(histories)}">
            <p class="mb-0">You haven't read any chapters yet.</p>
        </div>
    </section>
</main>

<!-- Include Footer -->
<div th:replace="~{clients/fragments/footers :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MangaCurator - Thanh Toán Thành Công</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/clients/buysubscriptions.css}"/>
    <style>
        .payment-result-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            background: var(--background);
        }

        .result-card {
            background: var(--surface-container-lowest);
            border-radius: 1.5rem;
            box-shadow: 0 24px 64px rgba(47, 47, 46, 0.1);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Success Banner ── */
        .result-banner {
            background: linear-gradient(135deg, #1a7f40 0%, #28c76f 100%);
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result-banner::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }

        .result-banner::after {
            content: '';
            position: absolute;
            bottom: -40px; right: -40px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        .icon-circle {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            position: relative;
            z-index: 1;
            animation: popIn 0.4s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .icon-circle .material-symbols-outlined {
            font-size: 2.5rem;
            color: #fff;
            font-variation-settings: 'FILL' 1, 'wght' 500;
        }

        .result-title {
            font-family: var(--font-headline);
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .result-subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
            position: relative;
            z-index: 1;
        }

        /* ── Body ── */
        .result-body {
            padding: 2rem;
        }

        .transaction-info {
            background: var(--surface-container-low);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .transaction-info-title {
            font-family: var(--font-headline);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--on-surface-variant);
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--surface-variant);
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            color: var(--on-surface-variant);
        }

        .info-value {
            font-weight: 600;
            color: var(--on-surface);
        }

        .info-value.amount {
            font-family: var(--font-headline);
            font-size: 1.05rem;
            color: #1a7f40;
            font-weight: 700;
        }

        .info-value.highlight {
            color: var(--primary);
        }

        .info-badge {
            background: #dcfce7;
            color: #15803d;
            padding: 0.2rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        /* ── Actions ── */
        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-primary-action {
            display: block;
            width: 100%;
            padding: 0.9rem 1.5rem;
            border-radius: 9999px;
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            background: linear-gradient(135deg, #914700 0%, #f97f06 100%);
            color: var(--on-primary);
            box-shadow: 0 8px 20px rgba(145, 71, 0, 0.2);
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary-action:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary-action {
            display: block;
            width: 100%;
            padding: 0.9rem 1.5rem;
            border-radius: 9999px;
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            background: var(--surface-container-high);
            color: var(--on-surface);
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-secondary-action:hover {
            background: var(--surface-container-highest);
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="fragments/headers :: header"></div>

<div class="payment-result-page">
    <div class="result-card">
        <!-- Banner -->
        <div class="result-banner">
            <div class="icon-circle">
                <span class="material-symbols-outlined">check_circle</span>
            </div>
            <h1 class="result-title">Thanh Toán Thành Công!</h1>
            <p class="result-subtitle">Gói hội viên của bạn đã được kích hoạt ngay lập tức.</p>
        </div>

        <!-- Body -->
        <div class="result-body">
            <div class="transaction-info">
                <p class="transaction-info-title">Chi tiết giao dịch</p>

                <div class="info-row">
                    <span class="info-label">Mã giao dịch</span>
                    <span class="info-value highlight" th:text="${transactionId}">TXN-00000</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Gói đăng ký</span>
                    <span class="info-value" th:text="${subscriptionName}">Gói Vàng</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Số tiền</span>
                    <span class="info-value amount" th:text="${amount} + 'đ'">99,000đ</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ngày bắt đầu</span>
                    <span class="info-value" th:text="${startedAt}">19/04/2026</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ngày kết thúc</span>
                    <span class="info-value" th:text="${endedAt}">19/05/2026</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Trạng thái</span>
                    <span class="info-badge">Hoàn thành</span>
                </div>
            </div>

            <div class="result-actions">
                <a class="btn-primary-action" th:href="@{/}">Bắt đầu đọc truyện</a>
                <a class="btn-secondary-action" th:href="@{/pricing}">Xem gói hội viên</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Dashboard</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=20260421_4)}">
</head>
<body class="mf-body">

<div th:replace="~{clients/fragments/headers :: header}"></div>

<main class="container-fluid container-xxl px-3 px-md-4 pb-5 mf-main-content">
    <div class="row g-4">
        <div class="col-12 col-lg-3">
            <div th:replace="~{clients/fragments/author-dashboard :: authorSidebar('dashboard')}"></div>
        </div>
        <div class="col-12 col-lg-9">
            <div class="mf-panel p-3 p-md-4 mb-4">
                <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-between">
                    <div>
                        <h1 class="mb-1 mf-page-heading">Dashboard</h1>
                        <p class="mb-0 mf-page-subtitle">Truyện đã đăng.</p>
                    </div>
                    <a th:href="@{/upload-comic}" class="btn mf-btn-gradient px-4">Đăng truyện</a>
                </div>
                <div th:if="${error}" class="alert alert-warning mt-3 mb-0" th:text="${error}"></div>
            </div>

            <section>
                <h3 class="mb-3 mf-section-title">
                    <span class="material-symbols-outlined me-1">auto_stories</span>
                    Truyện của tôi
                </h3>

                <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-xl-5 g-3 g-md-4" th:if="${myComics != null and !#lists.isEmpty(myComics)}">
                    <div class="col" th:each="comic : ${myComics}">
                        <a th:href="@{/comic/{slug}(slug=${comic.slug})}" class="text-decoration-none">
                            <article class="mf-comic-card h-100">
                                <div class="position-relative mf-cover-wrap mb-2">
                                    <img th:src="${comic.coverImg != null ? @imageUrlResolver.resolve(comic.coverImg) : 'https://placehold.co/600x840?text=Cover'}"
                                         class="w-100 h-100 object-fit-cover mf-comic-cover" th:alt="${comic.title}">
                                    <div class="mf-cover-overlay"></div>
                                </div>
                                <h6 class="mb-1 mf-comic-title" th:text="${comic.title}">Truyện</h6>
                                <small class="mf-comic-chapter" th:text="${comic.status}">ONGOING</small>
                            </article>
                        </a>
                    </div>
                </div>

                <div class="mf-empty-state text-center py-5" th:if="${myComics != null and #lists.isEmpty(myComics)}">
                    <p class="mb-2">Bạn chưa đăng truyện.</p>
                    <a th:href="@{/upload-comic}" class="btn mf-btn-gradient px-4">Hãy đăng truyện đầu tiên</a>
                </div>
            </section>
        </div>
    </div>
</main>

<div th:replace="~{clients/fragments/footers :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

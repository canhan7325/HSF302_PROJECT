<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Comic</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=20260421_3)}">
</head>
<body class="mf-body">

<div th:replace="~{clients/fragments/headers :: header}"></div>

<main class="container-fluid container-xxl px-3 px-md-4 pb-5 mf-main-content">
    <div class="row g-4">
        <div class="col-12 col-lg-3">
            <div th:replace="~{clients/fragments/author-dashboard :: authorSidebar('upload-comic')}"></div>
        </div>

        <div class="col-12 col-lg-9">
            <div class="row justify-content-center">
                <div class="col-12 col-md-11 col-lg-10 col-xl-9">
                    <div class="mf-panel p-3 p-md-4">
                        <h1 class="mb-2 mf-page-heading">Đăng truyện</h1>
                        <p class="mb-4 mf-page-subtitle">Tạo và đăng truyện.</p>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/author/upload-comic}" method="post" th:object="${comic}" enctype="multipart/form-data">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="titleInput" class="form-label mf-form-label">Tiêu đề</label>
                                    <input id="titleInput" type="text" class="form-control mf-form-control" th:field="*{title}" placeholder="Enter title">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                </div>

                                <div class="col-12">
                                    <label for="slugInput" class="form-label mf-form-label">Slug</label>
                                    <input id="slugInput" type="text" class="form-control mf-form-control" th:field="*{slug}" placeholder="e.g. naruto">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                                </div>

                                <div class="col-12">
                                    <label for="descriptionInput" class="form-label mf-form-label">Mô tả</label>
                                    <textarea id="descriptionInput" class="form-control mf-form-control" rows="5" th:field="*{description}" placeholder="Mô tả ngắn"></textarea>
                                </div>

                                <div class="col-12">
                                    <label class="form-label mf-form-label">Thể loại</label>

                                    <div class="d-flex flex-wrap gap-2">
                                        <div th:each="g : ${genres}" class="form-check">
                                            <input class="form-check-input"
                                                   type="checkbox"
                                                   name="genreIds"
                                                   th:value="${g.genreId}">
                                            <label class="form-check-label" th:text="${g.name}"></label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label for="coverFileInput" class="form-label mf-form-label">Ảnh bìa</label>
                                    <input id="coverFileInput" type="file" class="form-control mf-form-control" name="coverFile" accept="image/*">
                                    <div class="form-text">Ảnh sẽ được lưu để làm ảnh bìa.</div>
                                    <div class="mt-3" style="max-width: 240px;">
                                        <img id="coverPreview" src="https://placehold.co/480x640?text=Cover" alt="Cover preview"
                                             class="w-100 rounded-4" style="border:1px solid rgba(0,0,0,0.08);">
                                    </div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="statusSelect" class="form-label mf-form-label">Trạng thái</label>
                                    <select id="statusSelect" class="form-select mf-form-control" th:field="*{status}">
                                        <option value="SCHEDULED">SCHEDULED</option>
                                        <option value="ONGOING">ONGOING</option>
                                        <option value="COMPLETED">COMPLETED</option>
                                        <option value="CANCELED">CANCELED</option>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                                </div>

                                <div class="col-12 d-flex gap-2 pt-2">
                                    <button type="submit" class="btn mf-btn-gradient px-4">Tạo</button>
                                    <a th:href="@{/author/dashboard}" class="btn btn-outline-secondary rounded-pill px-4">Hủy</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{clients/fragments/footers :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
    (function () {
        const input = document.getElementById('coverFileInput');
        const preview = document.getElementById('coverPreview');
        if (!input || !preview) return;
        input.addEventListener('change', function () {
            const file = input.files && input.files[0];
            if (!file) return;
            preview.src = URL.createObjectURL(file);
        });
    })();
</script>
</body>
</html>

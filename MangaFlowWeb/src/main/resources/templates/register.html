<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - Editorial Manga</title>
    <link rel="stylesheet" th:href="@{/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body class="bg-light">
    <!-- Header -->
    <div th:replace="~{fragments/headers :: header}"></div>
    <main class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="card shadow border-0 rounded-4" style="width: 100%; max-width: 450px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Tạo tài khoản</h2>
                    <p class="text-muted small">The Digital Curator Experience.</p>
                </div>
                <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success small" th:text="${message}"></div>
                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold small">Email</label>
                        <input type="email" class="form-control rounded-3" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold small">Tên đăng nhập</label>
                        <input type="text" class="form-control rounded-3" id="username" name="username" placeholder="manga_fan_99" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold small">Mật khẩu</label>
                        <input type="password" class="form-control rounded-3" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid gap-2 mb-4">
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2 shadow-sm">Đăng ký</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0 text-muted small">
                        Đã có tài khoản? 
                        <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <div th:replace="~{fragments/footers :: footer}"></div>
    <script th:src="@{/bootstrap.bundle.min.js}"></script>
</body>
</html>

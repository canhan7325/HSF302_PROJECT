<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>500 – Internal Server Error</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center">
    <div class="text-center px-6">
        <p class="text-8xl font-black text-stone-200 select-none">500</p>
        <h1 class="mt-4 text-2xl font-bold text-stone-800">Something Went Wrong</h1>
        <p class="mt-2 text-stone-500" th:text="${message} ?: 'An unexpected error occurred. Please try again later.'"></p>
        <a th:href="@{/admin/dashboard}"
           class="mt-6 inline-block px-5 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition-colors">
            Back to Dashboard
        </a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Library</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f6f6;
            margin: 0;
        }

        /* CONTENT */
        .container {
            padding: 30px 40px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .sub {
            color: gray;
            margin-bottom: 20px;
        }

        /* SUB + FILTER ROW */
        .sub-filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .sub-filter-row .sub {
            margin-bottom: 0;
            flex: 1;
        }

        .sub-filter-row .filter {
            margin-bottom: 0;
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter button {
            margin-right: 0;
        }

        /* FILTER */
        .filter {
            margin-bottom: 20px;
        }

        .filter button {
            border: none;
            padding: 8px 15px;
            margin-right: 10px;
            border-radius: 20px;
            cursor: pointer;
            background: #eee;
        }

        .filter .active {
            background: #ff6b00;
            color: white;
        }

        /* GRID */
        .grid {
            display: grid;
            gap: 20px;
            /* default: 2 columns on very small screens */
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        /* responsive columns -> up to 6 per row */
        @media (min-width: 576px) {
            .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
        @media (min-width: 992px) {
            .grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        }
        @media (min-width: 1200px) {
            .grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.2s;
            box-sizing: border-box;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        /* top-right actions */
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .card-actions a,
        .card-actions button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.10);
            text-decoration: none;
            color: #111827;
        }

        .card-actions svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .bookmark-btn.is-bookmarked {
            background: #fbbf24; /* yellow */
            color: #111827;
        }

        .bookmark-btn.is-loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .card-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-sizing: border-box;
        }

        .title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .chapter {
            font-size: 12px;
            color: gray;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 0 -10px -10px -10px; /* cancel card-body padding on sides + bottom */
        }

        /* Ensure button aligns with card edges (no inset) */
        .read {
            display: flex;
            align-items: center;
            justify-content: center;
            float: none;
            width: 100%;
            margin: 0;
            border: none;
            box-sizing: border-box;
            padding: 12px 12px;
            border-radius: 0 0 15px 15px; /* flush with card bottom */
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            background: #ff6b00;
            color: #fff;
            box-shadow: none;
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        /* Small status text above button */
        .chapter-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 0 10px; /* keep status text aligned with title */
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            background: #f3f4f6;
            color: #374151;
        }

        .badge.unread {
            background: rgba(255, 107, 0, 0.12);
            color: #b54800;
        }

        /* LOAD MORE */
        .load-more {
            text-align: center;
            margin-top: 30px;
        }

        .load-more button {
            background: #a65a00;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Filtering */
        .card.is-hidden {
            display: none;
        }

        /* Wrapper for main content (bookmark list does NOT reserve footer space) */
        .mf-main-content {
            min-height: calc(100vh - 56px);
        }

        /* Pagination toggle: default hide cards beyond 2 rows (12 items) */
        .card.is-collapsed {
            display: none;
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/headers :: header}"></div>

<main class="container-fluid container-xxl px-3 px-md-4 pb-5 mf-main-content">

<!-- CONTENT -->
<div class="container">

    <h1>My Library</h1>

    <div class="sub-filter-row">
        <div class="sub">
            You have <span th:text="${#lists.size(bookmarks)}"></span> bookmarked series
        </div>

        <!-- FILTER -->
        <div class="filter" id="bookmarkFilter">
            <button class="active" type="button" data-filter="all">All Manga</button>
            <button type="button" data-filter="reading">Reading</button>
            <button type="button" data-filter="unread">Unread</button>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid" id="bookmarkGrid">
        <div class="card"
             th:each="b : ${bookmarks}"
             th:attr="data-status=${b.continueChapterId != null ? 'reading' : 'unread'},
                      data-comic-id=${b.comicId},
                      data-bookmarked=${b.bookmarked != null ? b.bookmarked : true}">

            <div class="card-actions">
                <!-- Mục lục -> /comic/{slug} -->
                <a class="toc-btn"
                   th:if="${b.comicSlug != null}"
                   th:href="@{/comic/{slug}(slug=${b.comicSlug})}"
                   title="Mục lục">
                    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                </a>

                <!-- Bookmark button -->
                <button type="button"
                        class="bookmark-btn"
                        th:classappend="${b.bookmarked} ? ' is-bookmarked' : ''"
                        th:if="${isLoggedIn}"
                        title="Bookmark"
                        th:attr="data-comic-id=${b.comicId}">
                    <svg viewBox="0 0 24 24"><path d="M17,3H7A2,2 0 0,0 5,5V21L12,18L19,21V5C19,3.89 18.1,3 17,3Z"/></svg>
                </button>

                <a th:if="${!isLoggedIn}" href="/login" title="Đăng nhập để Bookmark">
                    <svg viewBox="0 0 24 24"><path d="M17,3H7A2,2 0 0,0 5,5V21L12,18L19,21V5C19,3.89 18.1,3 17,3M17,18L12,15.82L7,18V5H17V18Z"/></svg>
                </a>
            </div>

            <!-- Cover -->
            <img th:src="${@imageUrlResolver.resolve(b.thumbnailUrl)}" th:alt="${b.comicName}" alt="cover">

            <div class="card-body">
                <div class="title" th:text="${b.comicName}">Comic Name</div>

                <div class="chapter">
                    <th:block th:if="${b.continueChapterId != null}">
                        <div class="chapter-status">
                            <span>Continue: Ch. <span th:text="${b.continueChapterNumber}">0</span></span>
                            <span class="badge">Reading</span>
                        </div>
                        <a class="read"
                           th:href="@{/chapters/{id}/read(id=${b.continueChapterId})}">
                            Continue
                        </a>
                    </th:block>

                    <th:block th:if="${b.continueChapterId == null}">
                        <div class="chapter-status">
                            <span>&nbsp;</span>
                            <span class="badge unread">Unread</span>
                        </div>
                        <a class="read" th:href="@{/chapters(comicId=${b.comicId})}">Read Now</a>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <!-- LOAD MORE -->
    <div class="load-more">
        <button>Xem thêm</button>
    </div>

</div>

</main>

<!-- Footer (outside main, same as index) -->
<div th:replace="~{fragments/footers :: footer}"></div>

<script th:src="@{/bootstrap.bundle.min.js}"></script>

<script>
(function () {
    const STORAGE_KEY = 'bookmarkFilter';
    const DEFAULT_VISIBLE = 12; // 2 rows * 6 per row (on large screens)

    const filterRoot = document.getElementById('bookmarkFilter');
    const grid = document.getElementById('bookmarkGrid');
    const loadMoreBtn = document.querySelector('.load-more button');
    if (!filterRoot || !grid) return;

    const buttons = Array.from(filterRoot.querySelectorAll('button[data-filter]'));

    function allCards() {
        return Array.from(grid.querySelectorAll('.card[data-status]'));
    }

    function visibleCardsWithFilter(filterValue) {
        const v = (filterValue || 'all').toLowerCase();
        return allCards().filter(card => {
            const status = (card.getAttribute('data-status') || '').toLowerCase();
            const matches = (v === 'all') || (status === v);
            return matches && !card.classList.contains('is-hidden');
        });
    }

    function setActiveByValue(value) {
        const v = (value || 'all').toLowerCase();
        buttons.forEach(b => b.classList.toggle('active', (b.getAttribute('data-filter') || '').toLowerCase() === v));
    }

    function showLoadMore(show) {
        if (!loadMoreBtn) return;
        loadMoreBtn.style.display = show ? '' : 'none';
    }

    function isExpanded() {
        return grid.getAttribute('data-expanded') === 'true';
    }

    function setExpanded(expanded) {
        grid.setAttribute('data-expanded', expanded ? 'true' : 'false');
    }

    function applyCollapse(filterValue) {
        const expanded = isExpanded();

        // Reset collapsed state first
        allCards().forEach(c => c.classList.remove('is-collapsed'));

        if (expanded) {
            showLoadMore(false);
            return;
        }

        // Collapse to first DEFAULT_VISIBLE cards (within current filter)
        const list = visibleCardsWithFilter(filterValue);
        list.forEach((card, idx) => {
            if (idx >= DEFAULT_VISIBLE) card.classList.add('is-collapsed');
        });

        showLoadMore(list.length > DEFAULT_VISIBLE);
    }

    function applyFilter(value) {
        const v = (value || 'all').toLowerCase();

        // Apply filter show/hide
        allCards().forEach(card => {
            const status = (card.getAttribute('data-status') || '').toLowerCase();
            const show = (v === 'all') || (status === v);
            card.classList.toggle('is-hidden', !show);
        });

        setActiveByValue(v);

        // Re-apply collapse for the current filter
        applyCollapse(v);

        try {
            localStorage.setItem(STORAGE_KEY, v);
        } catch (e) {
            // ignore storage errors
        }
    }

    filterRoot.addEventListener('click', function (e) {
        const btn = e.target && e.target.closest ? e.target.closest('button[data-filter]') : null;
        if (!btn) return;

        // When changing filter, go back to collapsed mode
        setExpanded(false);

        const value = btn.getAttribute('data-filter');
        applyFilter(value);
    });

    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', function () {
            setExpanded(true);
            // keep current filter
            const current = (filterRoot.querySelector('button.active')?.getAttribute('data-filter')) || 'all';
            applyCollapse(current);
        });
    }

    // restore last selected filter
    let initial = 'all';
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved && ['all', 'reading', 'unread'].includes(saved.toLowerCase())) {
            initial = saved.toLowerCase();
        }
    } catch (e) {
        // ignore
    }

    // default collapsed
    setExpanded(false);
    applyFilter(initial);
})();
</script>

<!-- Inject login state cho bookmark.js -->
<script th:inline="javascript">
    window.APP_IS_LOGGED_IN = /*[[${isLoggedIn}]]*/ false;
</script>

<!-- Shared bookmark script -->
<script th:src="@{/js/bookmark.js}" defer></script>
</body>
</html>

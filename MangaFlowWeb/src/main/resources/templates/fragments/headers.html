<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Header Fragment -->
<header th:fragment="header" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="mf-header fixed-top">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid container-xxl px-3 px-md-4">
            <a th:href="@{/}" class="navbar-brand mb-0 h1 mf-brand text-decoration-none">MangaCurator</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation" th:unless="${hideNav == true}">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar" th:unless="${hideNav == true}">
                <div class="mf-header-search"
                     th:if="${hideSearch != true}"
                     sec:authorize="!hasRole('ADMIN') and !hasRole('AUTHOR')"
                     data-search-endpoint="/api/comics/search">
                    <label for="comicSearchInput" class="visually-hidden">Tim truyen theo ten</label>
                    <input type="text"
                           class="form-control mf-header-search-input"
                           id="comicSearchInput"
                           autocomplete="off"
                           placeholder="Tìm truyện theo tên...">
                    <div class="mf-search-suggestions d-none" id="comicSearchSuggestions"></div>
                </div>

                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item"><a th:href="@{/}" class="nav-link active">Trang chủ</a></li>
                    <li class="nav-item" sec:authorize="hasRole('AUTHOR')">
                        <a th:href="@{/author/dashboard}" class="nav-link">Author Studio</a>
                    </li>
                    <li class="nav-item"><a th:href="@{/bookmarks}" class="nav-link">Thư viện</a></li>
                    <li class="nav-item"><a th:href="@{/reading-histories}" class="nav-link">Lịch sử đọc</a></li>
                    <li class="nav-item"><a th:href="@{/login(redirect='/pricing')}" class="nav-link" sec:authorize="!isAuthenticated()">Gói Hội Viên</a></li>
                    <li class="nav-item"><a th:href="@{/pricing}" class="nav-link" sec:authorize="isAuthenticated()">Gói Hội Viên</a></li>
                </ul>

                <div class="d-flex align-items-center gap-2 mf-header-auth">
                    <!-- Unauthenticated -->
                    <div sec:authorize="!isAuthenticated()" class="d-flex align-items-center gap-2">
                        <a th:href="@{/login}" class="btn btn-link text-decoration-none mf-btn-link">Đăng nhập</a>
                        <a th:href="@{/register}" class="btn mf-btn-gradient">Đăng ký</a>
                    </div>

                    <!-- Authenticated -->
                    <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 1rem;">
                        <div>
                            <span style="font-weight: 500;">
                                Xin chào, <b sec:authentication="name"></b>
                            </span>
                            <br>
                            <span sec:authorize="hasRole('AUTHOR')" style="font-size: 0.85rem; color: #914700; font-weight: 600;">
                                Tác giả
                            </span>
                            <span th:if="${userMembership}" style="font-size: 0.85rem; color: #914700; font-weight: 600; margin-left: 0.5rem;" th:text="${userMembership}">
                                Hội Viên Bạc
                            </span>
                            <span th:unless="${userMembership}" sec:authorize="!hasRole('AUTHOR')" style="font-size: 0.85rem; color: #666;">
                                Người dùng thường
                            </span>
                        </div>
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-link text-decoration-none mf-btn-link">Đăng xuất</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <script th:src="@{/js/header-search.js(v=20260422_4)}"></script>
</header>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Header Fragment -->
<header th:fragment="header" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="mf-header fixed-top">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid container-xxl px-3 px-md-4">
            <a th:href="@{/}" class="navbar-brand mb-0 h1 mf-brand text-decoration-none">MangaCurator</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation" th:unless="${hideNav == true}">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar" th:unless="${hideNav == true}">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a th:href="@{/}" class="nav-link active">Thư Viện</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Xu Hướng</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Cộng Đồng</a></li>
                    <li class="nav-item"><a th:href="@{/pricing}" class="nav-link">Gói Hội Viên</a></li>
                </ul>

                    <div class="d-flex align-items-center gap-2">
                        <!-- Unauthenticated -->
                        <div sec:authorize="!isAuthenticated()" class="d-flex align-items-center gap-2">
                            <a th:href="@{/login}" class="btn btn-link text-decoration-none mf-btn-link">Log In</a>
                            <a th:href="@{/register}" class="btn mf-btn-gradient">Sign Up</a>
                        </div>

                        <!-- Authenticated -->
                        <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 1rem;">
                            <div>
                                <span style="font-weight: 500;">
                                    Xin chào, <b sec:authentication="name"></b>
                                </span>
                                <br>
                                <span th:if="${userMembership}" style="font-size: 0.85rem; color: #914700; font-weight: 600;" th:text="${userMembership}">
                                    Hội Viên Bạc
                                </span>
                                <span th:unless="${userMembership}" style="font-size: 0.85rem; color: #666;">
                                    Người dùng thường
                                </span>
                            </div>
                            <form th:action="@{/logout}" method="post" style="margin: 0;">
                                <button type="submit" class="btn-login" style="border: none; background: transparent; cursor: pointer;">Đăng xuất</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Reusable fragments for chapter reader -->

<th:block th:fragment="prevNextButtons(prevChapterId, nextChapterId)">
    <div class="chapter-nav">
        <a th:if="${prevChapterId != null}"
           th:href="@{/chapters/{id}/read(id=${prevChapterId})}"
           class="chap-btn prev">
            ‹ Chap trước
        </a>
        <a th:unless="${prevChapterId != null}"
           href="#"
           class="chap-btn prev disabled">
            ‹ Chap trước
        </a>

        <a th:if="${nextChapterId != null}"
           th:href="@{/chapters/{id}/read(id=${nextChapterId})}"
           class="chap-btn next">
            Chap sau ›
        </a>
        <a th:unless="${nextChapterId != null}"
           href="#"
           class="chap-btn next disabled">
            Chap sau ›
        </a>
    </div>
</th:block>

<!--
  breadcrumb wants:
  - comic link: /comic/{slug}
  - chapter link: /chapters/{id}/read
-->
<th:block th:fragment="breadcrumbToChapter(comicSlug, comicTitle, chapter)">
    <div class="breadcrumb">
        <a href="/">Trang chủ</a>
        <span class="separator"> &raquo; </span>

        <a th:href="@{/comic/{slug}(slug=${comicSlug})}"
           th:text="${comicTitle}">Tên truyện</a>
        <span class="separator"> &raquo; </span>

        <a class="current"
           th:href="@{/chapters/{id}/read(id=${chapter.chapterId})}"
           th:text="'Chapter ' + ${chapter.chapterNumber}">
        </a>
    </div>
</th:block>

<th:block th:fragment="breadcrumbEnd(comicSlug, comicTitle, chapter)">
    <div class="breadcrumb">
        <a href="/">Trang chủ</a>
        <span class="separator"> &raquo; </span>

        <a th:href="@{/comic/{slug}(slug=${comicSlug})}"
           th:text="${comicTitle}">Tên truyện</a>
        <span class="separator"> &raquo; </span>

        <a class="current"
           th:href="@{/chapters/{id}/read(id=${chapter.chapterId})}"
           th:text="'Chapter ' + ${chapter.chapterNumber}">
        </a>
    </div>
</th:block>

<th:block th:fragment="chapterTitle(comicTitle, chapter)">
    <div class="chapter-title">
        <span th:text="${comicTitle} + ' - Chapter ' + ${chapter.chapterNumber}"></span>
        <span class="time">
            (Đăng lúc:
            <span th:text="${#temporals.format(chapter.createdAt, 'HH:mm dd/MM/yyyy')}"></span>
            )
        </span>
    </div>
</th:block>

</body>
</html>

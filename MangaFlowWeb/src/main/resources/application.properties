spring.application.name=MangaFlowWeb

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Manga_flow;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Avoid loading persisted Tomcat sessions (prevents EOFException on dev restarts)
server.servlet.session.persistent=false

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
